<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>DbD パークランダム</title>

  <!-- 👇ここに追加 -->
  <style>
    body {
      background: #111;
      color: white;
      font-family: sans-serif;
    }

    #result {
      display: grid;
      grid-template-columns: repeat(4, 120px);
      gap: 20px;
      margin-top: 20px;
      list-style: none;
      padding: 0;
    }

    .perk-card {
      width: 120px;
      height: 120px;
      position: relative;
    }

    .perk-bg {
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #5a2a82, #2b0f3a);
      transform: rotate(45deg);
      border-radius: 12px;
      position: absolute;
      top: 0;
      left: 0;
      box-shadow: 0 0 10px #a855f7;
    }

    .perk-img {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 70px;
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    .perk-name {
      margin-top: 8px;
      text-align: center;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <h1>DbD パークランダム</h1>

  <button onclick="roll('survivor')">サバイバー抽選</button>
  <button onclick="roll('killer')">キラー抽選</button>

  <ul id="result"></ul>

  <script type="module" src="./script.js"></script>
</body>
</html>

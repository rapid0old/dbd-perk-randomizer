<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>DbD パークランダム</title>

  <style>
    body {
      background: #111;
      color: white;
      font-family: sans-serif;
    }

    #result {
      display: grid;
      grid-template-columns: repeat(4, 120px);
      gap: 20px;
      margin-top: 20px;
      list-style: none;
      padding: 0;
    }

    .perk-card {
      width: 120px;
      text-align: center;
    }

    /* 👇 ここから変更 */
    .perk {
      position: relative;
      width: 120px;
      height: 120px;
    }

    .perk-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;

      /* 🔥 画像背景に変更 */
      background-image: url("dbd_perks/background.png");
      background-size: cover;
      background-position: center;

      /* ちょい光らせる */
      filter: drop-shadow(0 0 8px #a855f7);
    }

    .perk-img {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 85%;   /* ← ここがポイント */
      height: 85%;
      object-fit: contain;
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    .perk-name {
      margin-top: 8px;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <h1>DbD パークランダム</h1>
  
  <h2>サバイバー名入力（最大4人）</h2>

  <div id="players">
    <input type="text" placeholder="プレイヤー1">
    <input type="text" placeholder="プレイヤー2">
    <input type="text" placeholder="プレイヤー3">
    <input type="text" placeholder="プレイヤー4">
  </div>

  <button onclick="roll('survivor')">サバイバー抽選</button>
  <button onclick="roll('killer')">キラー抽選</button>

  <ul id="result"></ul>

  <script type="module" src="./script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>DbD パークランダム</title>

  <style>
    body {
      background: radial-gradient(circle, #1a1a1a, #000);
      color: white;
      font-family: sans-serif;
    
      display: flex;
      justify-content: center;
      margin: 0;
    }

    .container {
      max-width: 600px;
      width: 100%;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    h1 {
      font-size: 28px;
      text-shadow: 0 0 10px #a855f7;
    }

    /* 入力欄 */
    #players {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }

    #players input {
      padding: 8px;
      border-radius: 6px;
      border: none;
    }

    /* ボタン */
    button {
      margin: 5px;
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      background: #7c3aed;
      color: white;
      cursor: pointer;
    
      /* アニメーション */
      transition: all 0.1s ease;
    
      /* 立体感 */
      box-shadow: 0 4px 0 #5b21b6;
    }
    
    /* ホバー（マウス乗せ） */
    button:hover {
      background: #9333ea;
    }

    /* 押した瞬間（ここが重要🔥） */
    /* 通常ボタン（抽選など） */
    button:active {
      transform: translateY(2px) scale(0.98);
      box-shadow: 0 2px 0 #5b21b6;
    }
    
    /* 再抽選（軽くする） */
    .reroll-btn:active {
      transform: none;              /* ← 動かさない */
      box-shadow: 0 2px 0 #5b21b6;  /* ← 少しだけ影を減らす */
    }

    /* 結果表示 */
    #result {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 20px;
      margin-top: 20px;
      list-style: none;
      padding: 0;
      justify-items: center;
    }

    .perk-card {
      width: 140px;  /* ← 120 → 140に拡大 */
      text-align: center;
    }

    .perk {
      position: relative;
      width: 140px;   /* ← ここも合わせる */
      height: 140px;
    }

    .perk-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;

      background-image: url("dbd_perks/background.png");
      background-size: cover;
      background-position: center;

      filter: drop-shadow(0 0 8px #a855f7);
    }

    .perk-img {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 90%;
      height: 90%;
      object-fit: contain;
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    .perk-name {
      margin-top: 8px;
      font-size: 16px;   /* ← 14〜15 → 16 */
      font-weight: bold;
      text-shadow: 0 0 5px rgba(168, 85, 247, 0.7);
    }

    .perk-name {
      word-break: break-word;
    }

    .perk {
      transition: 0.2s;
    }
    
    .perk:hover {
      transform: scale(1.1);
    }

    /* サバイバー表示用 */
    .player-block {
      grid-column: span 4;
      margin-bottom: 20px;
    }

    .player-perks {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .player-header {
      position: relative;
      text-align: center;
    
      margin-bottom: 20px;  /* ← ここを増やす */
      margin-top: 10px;     /* ← これ追加で上にも余裕 */
    }
    
    .player-name {
      font-size: 22px;
      font-weight: bold;
    }
    
    .reroll-btn {
      position: absolute;
      right: 0;   /* ← 右に固定 */
      top: 50%;
      transform: translateY(-50%);
      
      padding: 5px 10px;
      font-size: 12px;
    }

    @media (max-width: 600px) {
      .perk-card {
        width: 110px;
      }
    
      .perk {
        width: 110px;
        height: 110px;
      }
    }
    
  </style>
</head>

<body>

  <div class="container">

    <h1>DbD パークランダム</h1>

    <h2>サバイバー名入力（最大4人）</h2>

    <div id="players">
      <input type="text" placeholder="プレイヤー1">
      <input type="text" placeholder="プレイヤー2">
      <input type="text" placeholder="プレイヤー3">
      <input type="text" placeholder="プレイヤー4">
    </div>

    <button onclick="roll('survivor')">サバイバー抽選</button>
    <button onclick="roll('killer')">キラー抽選</button>
    <button onclick="copyBuild()">コピー</button>

    <ul id="result"></ul>

  </div>

  <script src="./script.js"></script>

</body>
</html>
